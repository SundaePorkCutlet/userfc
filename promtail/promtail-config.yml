# Promtail config for USERFC — 로그 수집 후 Loki로 전송
# docker-compose에서 volume: ./USERFC/promtail/promtail-config.yml:/etc/promtail/config.yml
server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: userfc
    static_configs:
      - targets:
          - localhost
        labels:
          job: userfc
          __path__: /var/log/userfc/*.log
